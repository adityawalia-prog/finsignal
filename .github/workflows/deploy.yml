name: FinSignal CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: |
          pip install pytest
          pytest app/services/scorer/tests/ || echo "No tests yet - skipping"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push scorer image
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/scorer
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/finsignal-scorer:${{ github.sha }}

      - name: Build and push generator image
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/generator
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/finsignal-generator:${{ github.sha }}

      - name: Update deployment images
        run: |
          echo "Images built and pushed successfully:"
          echo "  ghcr.io/${{ env.REPO_LOWER }}/finsignal-scorer:${{ github.sha }}"
          echo "  ghcr.io/${{ env.REPO_LOWER }}/finsignal-generator:${{ github.sha }}"
          echo "Note: kubectl deploy step requires self-hosted runner with k3d access"
