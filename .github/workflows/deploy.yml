name: FinSignal CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      scorer_image: ${{ steps.meta.outputs.scorer_image }}
      generator_image: ${{ steps.meta.outputs.generator_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: |
          pip install pytest
          pytest app/services/scorer/tests/ || echo "No tests yet - skipping"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push scorer image
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/scorer
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/finsignal-scorer:${{ github.sha }}

      - name: Build and push generator image
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/generator
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/finsignal-generator:${{ github.sha }}

      - name: Export image tags
        id: meta
        run: |
          echo "scorer_image=ghcr.io/${{ env.REPO_LOWER }}/finsignal-scorer:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "generator_image=ghcr.io/${{ env.REPO_LOWER }}/finsignal-generator:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Set context to finsignal cluster
        run: kubectl config use-context k3d-finsignal

      - name: Verify cluster is reachable
        run: kubectl get nodes

      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pull images into k3d cluster
        run: |
          k3d image import \
            ghcr.io/${{ env.REPO_LOWER }}/finsignal-scorer:${{ github.sha }} \
            -c finsignal
          k3d image import \
            ghcr.io/${{ env.REPO_LOWER }}/finsignal-generator:${{ github.sha }} \
            -c finsignal

      - name: Deploy scorer
        run: |
          kubectl set image deployment/scorer \
            scorer=ghcr.io/${{ env.REPO_LOWER }}/finsignal-scorer:${{ github.sha }} \
            --namespace finsignal
          kubectl rollout status deployment/scorer \
            --namespace finsignal --timeout=120s

      - name: Deploy generator
        run: |
          kubectl set image deployment/generator \
            generator=ghcr.io/${{ env.REPO_LOWER }}/finsignal-generator:${{ github.sha }} \
            --namespace finsignal
          kubectl rollout status deployment/generator \
            --namespace finsignal --timeout=120s

      - name: Verify deployments
        run: |
          kubectl get pods -n finsignal
          echo "Deploy complete: ${{ github.sha }}"
